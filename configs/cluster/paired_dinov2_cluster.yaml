# Environment: cluster (UZH Science) - composed DINO-POC dataset
# DINOv2 baseline config.

# ---- I/O ----
train_img_dir: "/home/cfuste/data/datasets/TRIPLET/train/images"
train_mask_dir: "/home/cfuste/data/datasets/TRIPLET/train/masks"
test_img_dir:    "/home/cfuste/data/datasets/TRIPLET/test/images"
test_mask_dir:   "/home/cfuste/data/datasets/TRIPLET/test/masks"

# results + experiment naming
experiment_id: "2025-02-23_TRIPLET_dinov2_frozen_seg"
results_root: "/home/cfuste/data/DINO-LoRA/dinov2/seg"
task_type: "triplet-lora"

dataset:
  type: paired          # use generic PairedDirsSegDataset
  params:
    pair_mode: stem
    recursive: false

# ---- model / backbone ----
backbone:
  name: dinov2
  variant: base
  load_backend: torchhub
  weights: null
  repo_dir: null
  preprocess:
    preset: em
dino_size: base
img_size:
  mode: longest_edge
  target: 1022   # largest <= 1024 while staying multiple of 14
  patch_multiple: 14
  rounding: floor
num_classes: 2

# ---- fine-tuning ----
use_lora: true
full_finetune: false

# ---- training ----
batch_size: 2
epochs: 1000
patience: 20
lr: 0.00005
weight_decay: 0.0001
num_workers: 4
device: auto
amp: false
val_ratio: 0.1
split_seed: 42
data_augmentation: false
data_augmentation_prob: 0.5
clahe_norm: false

# ---- loss ----
loss: dice

# ---- training safety ----
clip_grad_norm: 1.0   # global grad clip

# ---- export / viz ----
binarize: true
binarize_threshold: 128