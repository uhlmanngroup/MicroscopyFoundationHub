# Environment: cluster (UZH Science) - composed DINO-POC dataset
# DINOv3 paired full fine-tuning config.

# ---- I/O ----
train_img_dir: "/home/cfuste/data/datasets/TRIPLET/train/images"
train_mask_dir: "/home/cfuste/data/datasets/TRIPLET/train/masks"
test_img_dir:    "/home/cfuste/data/datasets/TRIPLET/test/images"
test_mask_dir:   "/home/cfuste/data/datasets/TRIPLET/test/masks"

# results + experiment naming
experiment_id: "2025-02-23_TRIPLET_dinov3_frozen_seg"
results_root: "/home/cfuste/data/DINO-LoRA/dinov3/seg/"
task_type: "triplet-nolora"

dataset:
  type: paired          # use generic PairedDirsSegDataset
  params:
    pair_mode: stem
    recursive: false

# ---- model / backbone ----
backbone:
  name: dinov3
  variant: vitl16
  load_backend: torchhub
  repo_dir: /home/cfuste/GitHub/dinov3
  weights: /home/cfuste/data/models/dinov3/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth
  preprocess:
    preset: em
dino_size: vitl16
img_size:
  mode: longest_edge
  target: 1022   # largest <= 1024 while staying multiple of 16
  patch_multiple: 16
  rounding: floor
num_classes: 2


# ---- fine-tuning ----
use_lora: false
full_finetune: false
data_augmentation: false
data_augmentation_prob: 0.5
clahe_norm: false

# ---- training ----
batch_size: 2
epochs: 10000
patience: 20 # early stopping
lr: 0.00005
weight_decay: 0.0001
num_workers: 4
device: auto
amp: false
val_ratio: 0.1
split_seed: 42

# ---- loss ----
loss: dice

# ---- training safety ----
clip_grad_norm: 1.0   # global grad clip

# ---- export / viz ----
binarize: true
binarize_threshold: 128

# ---- evaluation previews ----
eval_preview_mode: all   # all|random
eval_preview_cols: 4
