# Environment: cluster (UZH Science) - DeepBacs paired dataset with optional balanced batching

# ---- I/O ----
train_img_dir: "/home/cfuste/data/datasets/deepbacs/paired/aureus-subtilis/train/images"
train_mask_dir: "/home/cfuste/data/datasets/deepbacs/paired/aureus-subtilis/train/masks"
test_img_dir: "/home/cfuste/data/datasets/deepbacs/paired/aureus-subtilis/test/images"
test_mask_dir: "/home/cfuste/data/datasets/deepbacs/paired/aureus-subtilis/test/masks"

# ---- results ----
experiment_id: "2026-03-24_deepbacs_paired_aureus-subtilis_dinov2_balance_ablation"
results_root: "/home/cfuste/data/DINO-LoRA/dinov2/deepbacs/seg/paired"
task_type: "aureus-subtilis"
modality: "deepbacs"
deepbacs_center_crop_size: 448
paired_dataset_name: "aureus-subtilis"

dataset:
  type: paired
  params:
    pair_mode: stem
    recursive: false

# ---- balanced sampling ----
# Balanced batches enforce batch_size=2 and yield exactly one sample from each source.
# The script infers the source split from `paired_dataset_name` (or from train_img_dir if omitted).
# Known mappings:
#   aureus-subtilis -> jenilered + test
#   coli-aureus     -> pos + jenilered
#   coli-subtilis   -> pos + test
balanced_sampling:
  match_source: path

# ---- model / backbone ----
backbone:
  name: dinov2
  variant: base
  load_backend: torchhub
  weights: null
  repo_dir: null
  preprocess:
    preset: em
dino_size: base
img_size:
  mode: native
num_classes: 2

# ---- fine-tuning ----
# Use the script CLI to switch between frozen and LoRA:
#   --tuning-mode frozen
#   --tuning-mode lora
use_lora: false
full_finetune: false

# ---- training ----
batch_size: 2
epochs: 1000
patience: 20
lr: 0.00005
weight_decay: 0.0001
num_workers: 4
device: auto
amp: false
val_ratio: 0.1
split_seed: 42
data_augmentation: false
data_augmentation_prob: 0.5
clahe_norm: false

# ---- loss ----
loss: dice

# ---- safety / export ----
clip_grad_norm: 1.0
binarize: true
binarize_threshold: 0
