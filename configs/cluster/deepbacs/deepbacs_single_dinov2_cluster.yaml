# Environment: cluster (UZH Science) - DeepBacs single dataset

# ---- I/O ----
train_img_dir: "/home/cfuste/data/datasets/deepbacs/single/subtilis/train/images"
train_mask_dir: "/home/cfuste/data/datasets/deepbacs/single/subtilis/train/masks"
test_img_dir: "/home/cfuste/data/datasets/deepbacs/single/subtilis/test/images"
test_mask_dir: "/home/cfuste/data/datasets/deepbacs/single/subtilis/test/masks"

# ---- results ----
experiment_id: "2026-03-18_deepbacs_subtilis_dinov2_fullft_seg"
results_root: "/home/cfuste/data/DINO-LoRA/dinov2/deepbacs/seg"
task_type: "subtilis-fullft"
modality: "deepbacs"
deepbacs_center_crop_size: 448

dataset:
  type: paired
  params:
    pair_mode: stem
    recursive: false

# ---- model / backbone ----
backbone:
  name: dinov2
  variant: base
  load_backend: torchhub
  weights: null
  repo_dir: null
  preprocess:
    preset: em
dino_size: base
img_size:
  mode: native
num_classes: 2

# ---- fine-tuning ----
use_lora: false
full_finetune: true

# ---- training ----
batch_size: 2
epochs: 1000
patience: 20
lr: 0.00005
weight_decay: 0.0001
num_workers: 4
device: auto
amp: false
val_ratio: 0.1
split_seed: 42
data_augmentation: false
data_augmentation_prob: 0.5
clahe_norm: false

# ---- loss ----
loss: dice

# ---- safety / export ----
clip_grad_norm: 1.0
binarize: true
binarize_threshold: 0
