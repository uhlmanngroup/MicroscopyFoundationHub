# Environment: cluster (UZH Science) - Kasthuri-only segmentation run
# DINOv2 full fine-tuning config.

# ---- I/O ----
train_img_dir: "/home/cfuste/data/datasets/Kasthuri++/Train_In"
train_mask_dir: "/home/cfuste/data/datasets/Kasthuri++/Train_Out"
test_img_dir:  "/home/cfuste/data/datasets/Kasthuri++/Test_In"
test_mask_dir: "/home/cfuste/data/datasets/Kasthuri++/Test_Out"

# results + experiment naming
experiment_id: "2026-02-27_kasthuri_dinov2_fullft_seg"
results_root: "/home/cfuste/data/DINO-LoRA/dinov2/seg"
task_type: "kasthuri-fullft"

# Kasthuri follows Lucchi-style pairing (numeric stems; no image prefix)
dataset:
  type: lucchi
  params:
    recursive: false
    image_prefix: ""
    zfill_width: 4

# ---- model / backbone ----
backbone:
  name: dinov2
  variant: large
  load_backend: torchhub
  weights: null
  repo_dir: null
  preprocess:
    preset: em
dino_size: large
img_size:
  mode: longest_edge
  target: 1022
  patch_multiple: 14
  rounding: floor
num_classes: 2

# ---- fine-tuning ----
use_lora: false
full_finetune: true

# ---- training ----
batch_size: 1
epochs: 1000
patience: 20
lr: 0.00005
weight_decay: 0.0001
num_workers: 4
device: auto
amp: false
val_ratio: 0.1
split_seed: 42

# ---- loss ----
loss: dice
class_weights: [1.0, 15.0]
tversky_alpha: 0.7
tversky_beta: 0.3
tversky_eps: 1.0e-6
tversky_weight: 0.6

# ---- training safety ----
clip_grad_norm: 1.0

# ---- export / viz ----
binarize: true
binarize_threshold: 128
clahe_norm: false
